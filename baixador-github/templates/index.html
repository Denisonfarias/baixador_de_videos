<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baixador meutudo</title>
  <style>
    :root {
      --bg: #0f0a14;
      --card: #1a1320;
      --accent: #d946ef;
      --accent-2: #a855f7;
      --text: #f5f3f7;
      --muted: #9b8aa8;
      --border: #2a1f33;
      --ok: #22c55e;
      --err: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 20% 0%, #2a0f3d 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }
    .wrap { width: 100%; max-width: 640px; }
    h1 {
      font-size: 28px;
      margin: 0 0 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, select, button { font-family: inherit; font-size: 15px; }
    input[type=url], select {
      width: 100%;
      padding: 12px 14px;
      background: #100a17;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    input[type=url]:focus, select:focus { border-color: var(--accent); }
    .row { display: flex; gap: 12px; margin-top: 16px; }
    .row > div { flex: 1; }
    button#go {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: 0;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform .1s, opacity .15s;
    }
    button#go:hover { transform: translateY(-1px); }
    button#go:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .status.show { display: block; }
    .status.loading { background: #1a1530; color: var(--muted); }
    .status.success { background: rgba(34,197,94,.1); color: var(--ok); border: 1px solid rgba(34,197,94,.3); }
    .status.error { background: rgba(239,68,68,.1); color: var(--err); border: 1px solid rgba(239,68,68,.3); }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 20px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(217,70,239,.15);
      color: var(--accent);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Baixador meutudo <span class="badge">CLOUD</span></h1>
    <p class="sub">Download de vídeos do YouTube · uso interno meutudo</p>

    <div class="card">
      <label for="url">URL do YouTube</label>
      <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." autofocus />

      <div class="row">
        <div>
          <label for="format">Formato</label>
          <select id="format">
            <option value="mp4_best">MP4 — melhor qualidade</option>
            <option value="mp4_1080">MP4 — até 1080p</option>
            <option value="mp4_720">MP4 — até 720p</option>
            <option value="mp3">MP3 — só áudio</option>
          </select>
        </div>
      </div>

      <button id="go">Baixar</button>

      <div id="status" class="status"></div>
    </div>

    <p class="footer">Uso interno · meutudo</p>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const btn = $("go");
    const statusEl = $("status");

    function setStatus(kind, html) {
      statusEl.className = "status show " + kind;
      statusEl.innerHTML = html;
    }

    btn.addEventListener("click", async () => {
      const url = $("url").value.trim();
      const format = $("format").value;
      if (!url) { setStatus("error", "Cole uma URL do YouTube."); return; }

      btn.disabled = true;
      setStatus("loading", '<span class="spinner"></span>Baixando do YouTube... (pode levar 30s–2min)');

      try {
        const res = await fetch("/api/download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, format }),
        });

        if (!res.ok) {
          let msg = "Erro " + res.status;
          try { const data = await res.json(); msg = data.error || msg; } catch (_) {}
          setStatus("error", msg);
          return;
        }

        setStatus("loading", '<span class="spinner"></span>Transferindo o arquivo...');
        const blob = await res.blob();
        const filename = res.headers.get("X-Filename") || "video.mp4";
        const sizeMb = (blob.size / (1024 * 1024)).toFixed(2);

        const objUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(objUrl), 1000);

        setStatus("success",
          `<div><strong>Download iniciado</strong></div>` +
          `<div style="margin-top:4px;font-size:13px;opacity:.8">${filename} · ${sizeMb} MB</div>`
        );
      } catch (e) {
        setStatus("error", "Falha de rede: " + e.message);
      } finally {
        btn.disabled = false;
      }
    });

    $("url").addEventListener("keydown", (e) => { if (e.key === "Enter") btn.click(); });
  </script>
</body>
</html>
